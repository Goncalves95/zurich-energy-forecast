version: "3.9"

# This compose file runs a local PostgreSQL container for development.
#
# For production, swap to Neon.tech (https://neon.tech) instead of the
# `postgres` service below:
#   1. Remove/skip the `postgres` service and its dependants' `depends_on: [postgres]`.
#   2. Set DATABASE_URL to your Neon connection string, e.g.
#      postgresql://user:password@host/dbname?sslmode=require
#   3. Run `alembic upgrade head` once to apply the schema to the Neon database.
#   4. Point each service's DATABASE_URL env var (or your .env file) at Neon
#      instead of the local `postgres` hostname.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: energy_forecast
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000
    volumes:
      - mlflow_data:/mlflow

  dashboard:
    build: .
    ports:
      - "8501:8501"
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    environment:
      # Swap for a Neon.tech URL in production (see comment above).
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/energy_forecast
    depends_on:
      - postgres

volumes:
  postgres_data:
  mlflow_data:
